<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">Orbitly Docs banner</title>
  <desc id="desc">Orbitly-branded documentation banner with orbital blue, cyan, and amber accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <circle cx="1310" cy="196" r="122" fill="#2563EB" opacity="0.42"/>
  <ellipse cx="1310" cy="196" rx="244" ry="82" fill="none" stroke="#22D3EE" stroke-width="4" opacity="0.7" transform="rotate(-18 1310 196)"/>
  <ellipse cx="1310" cy="196" rx="198" ry="58" fill="none" stroke="#F59E0B" stroke-width="4" opacity="0.75" transform="rotate(24 1310 196)"/>
